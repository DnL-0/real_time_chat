<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat App - WhatsApp Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-screen">
    <h2>Join Chat</h2>
    <input id="username" placeholder="Your username" />
    <input id="toUser" placeholder="Send to (username)" />
    <button onclick="join()">Enter Chat</button>
  </div>

  <div id="app">
    <div class="sidebar">
      <h3>Chat Info</h3>
      <p><strong>You:</strong> <span id="currentUser"></span></p>
      <p><strong>Talking to:</strong> <span id="targetUser"></span></p>
      <p><strong>Status:</strong> <span id="userStatus">Unknown</span></p>
    </div>

    <div class="chat-area">
      <div id="chat-box" class="chat-box">
        <!-- Messages will appear here -->
      </div>
      <div class="input-area">
        <input id="message" placeholder="Type a message..." />
        <button onclick="send()">Send</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
